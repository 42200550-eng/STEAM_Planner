    <circle cx="448" cy="64" r="64"/>
    <circle cx="64" cy="192" r="64"/>
    <circle cx="192" cy="192" r="64"/>
    <circle cx="320" cy="192" r="64"/>
    <circle cx="448" cy="192" r="64"/>
    <circle cx="64" cy="320" r="64"/>
    <circle cx="192" cy="320" r="64"/>
    <circle cx="320" cy="320" r="64"/>
    <circle cx="448" cy="320" r="64"/>
    <circle cx="64" cy="448" r="64"/>
    <circle cx="192" cy="448" r="64"/>
